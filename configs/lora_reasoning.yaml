# LoRA config for Reasoning Expert
# Specialization: thinking, problem-solving, analysis
# Large rank (128) = high capacity for complex reasoning chains.
# Lower lr (1e-4) = careful, stable learning on long reasoning sequences.
#
# IMPORTANT: Only MLP layers are trained. Attention layers are frozen
# to keep expert attention identical to the base model, which is
# required for MergeKit MoE (base model attention + expert MLPs).
# All experts train on ALL data — specialization via LoRA config + router.

model:
  name: "openbmb/MiniCPM5-1B"
  save_path: "models/experts/reasoning"

data:
  format: "messages"
  hf_path: "Petrouil/opencode-agentic-mini"
  max_length: 8192

lora:
  r: 128
  alpha: 256
  dropout: 0.05
  target_modules:
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-4
  num_train_epochs: 3
  max_steps: 800
  warmup_ratio: 0.05
  eval_strategy: "no"
  logging_steps: 10
  save_steps: 100
  save_total_limit: 2
  bf16: false
  fp16: true
  gradient_checkpointing: true
  max_grad_norm: 1.0
  lr_scheduler_type: "cosine"
  optim: "paged_adamw_8bit"
  ddp_find_unused_parameters: false

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: "float16"

enable_thinking: true
