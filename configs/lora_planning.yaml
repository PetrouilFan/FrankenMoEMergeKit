# LoRA config for Planning Expert
# Specialization: task decomposition, TODO management, project planning
# Medium rank (64) = balanced capacity for structured planning patterns.
#
# IMPORTANT: Only MLP layers are trained. Attention layers are frozen
# to keep expert attention identical to the base model, which is
# required for MergeKit MoE (base model attention + expert MLPs).
# All experts train on ALL data — specialization via LoRA config + router.

model:
  name: "openbmb/MiniCPM5-1B-Base"
  save_path: "models/experts/planning"

data:
  format: "messages"
  hf_path: "Petrouil/opencode-agentic-mini"
  max_length: 20000

lora:
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  num_train_epochs: 3
  max_steps: 600
  warmup_ratio: 0.05
  eval_strategy: "no"
  logging_steps: 10
  save_steps: 100
  save_total_limit: 2
  bf16: true
  gradient_checkpointing: true
  max_grad_norm: 1.0
  lr_scheduler_type: "cosine"
  optim: "paged_adamw_8bit"
  ddp_find_unused_parameters: false

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: "bfloat16"

enable_thinking: false
